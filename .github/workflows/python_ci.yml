name: Python CI

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - 'requirements.txt'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Tests against 3.10 and 3.11 — catches version-specific behavior in
        # torch, xgboost, and scipy which all have version-sensitive APIs
        python-version: ['3.10', '3.11']

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pylint

      - name: Lint with Pylint
        # W0611 = unused imports (catches dead weight signals like red_zone/third_down)
        # W0612 = unused variables
        # E0001 = syntax errors
        # C0415 = imports not at top (catches conditional import issues)
        # Scores below 7.0 fail the build
        run: |
          pylint brain.py mind.py edge.py scout.py cbs.py march.py \
                 transformer.py graph.py stack.py simulate.py \
                 tune.py audit.py baseline.py portfolio.py \
                 --disable=all \
                 --enable=E,W0611,W0612,W0613,C0415 \
                 --exit-zero \
                 --output-format=text \
            | tee pylint_report.txt
          echo "--- Pylint complete. Review report above for unused weight slots and dead features. ---"

      - name: Import smoke test
        # Verifies all modules import cleanly on both Python versions.
        # Catches API breakage in torch/xgboost/scipy before it hits production.
        run: |
          python -c "
          import sys
          print(f'Python {sys.version}')
          modules = ['brain', 'mind', 'edge', 'scout', 'cbs', 'march',
                     'transformer', 'graph', 'stack', 'simulate',
                     'tune', 'audit', 'baseline', 'portfolio']
          failed = []
          for m in modules:
              try:
                  __import__(m)
                  print(f'  OK: {m}')
              except Exception as e:
                  print(f'  FAIL: {m} — {e}')
                  failed.append(m)
          if failed:
              print(f'FAILED IMPORTS: {failed}')
              sys.exit(1)
          print('All modules imported successfully.')
          "

      - name: Feature vector shape test
        # Verifies build_feature_vector returns the expected 32-feature vector.
        # If a new feature is added without updating XGB_FEATURE_NAMES_DEFAULT,
        # or a feature is removed without updating the vector, this catches it.
        run: |
          python -c "
          import numpy as np
          from brain import build_feature_vector, XGB_FEATURE_NAMES_DEFAULT
          fv = build_feature_vector(
              home='Kansas City Chiefs', away='Buffalo Bills',
              game_date='2025-01-15', venue='Arrowhead Stadium', sport='nfl',
              patterns={}, team_history={}, elo_ratings={},
              pythagorean={}, standings={}, team_stats={},
              espn_stats={}, barttorvik={}, sos={},
          )
          expected = len(XGB_FEATURE_NAMES_DEFAULT)
          actual   = len(fv)
          assert actual == expected, f'Feature vector length mismatch: got {actual}, expected {expected}'
          print(f'Feature vector shape OK: {actual} features')
          "

      - name: Upload Pylint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pylint-report-py${{ matrix.python-version }}
          path: pylint_report.txt
          retention-days: 30
