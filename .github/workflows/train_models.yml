name: Train Advanced Models

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  train_models:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PyTorch Geometric
        run: pip install "torch-geometric>=2.4,<3.0"

      - name: Run advanced model training
        env:
          ODDS_API_KEY:    ${{ secrets.ODDS_API_KEY }}
          OPENWEATHER_KEY: ${{ secrets.OPENWEATHER_KEY }}
          BALLDONTLIE_KEY: ${{ secrets.BALLDONTLIE_KEY }}
        run: python brain.py --mode train_models

      - name: Verify training output
        run: |
          missing=()
          for f in transformer_models.pkl graph_models.pkl stack_models.pkl explain_models.pkl simulate_models.pkl; do
            [ -f "$f" ] || missing+=("$f")
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "WARNING: The following model files were not produced: ${missing[*]}"
          else
            echo "All model files confirmed present."
          fi

      - name: Save results
        run: |
          git config user.name  "EDGE Predict Bot"
          git config user.email "bot@edge-predict"
          [ -f "data.json" ] && git add -f "data.json" || echo "Skipping data.json (not found)"
          for f in transformer_models.pkl graph_models.pkl stack_models.pkl explain_models.pkl simulate_models.pkl; do
            [ -f "$f" ] && git add -f "$f" || echo "Skipping $f (not found)"
          done
          git diff --staged --quiet || git commit -m "Advanced models training complete $(date -u +%Y-%m-%d)"
          git pull --rebase && git push
